apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: gcr.io/TON-PROJECT-ID/api-gateway:1.0   # ← changer TON-PROJECT-ID
          ports:
            - containerPort: 8080
          env:
            # En K8s les services se trouvent par leur nom (DNS interne)
            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_URI
              value: http://student-service:8081
            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_URI
              value: http://course-service:8083
            - name: SPRING_CLOUD_GATEWAY_ROUTES_2_URI
              value: http://enrollment-service:8082
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 80             # port public Google Cloud
      targetPort: 8080     # port du conteneur
  type: LoadBalancer       # ← Google Cloud crée une IP publique automatiquement
