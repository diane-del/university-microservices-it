server:
  port: 8082

spring:
  application:
    name: servizio-iscrizioni

  datasource:
    url: jdbc:postgresql://localhost:5433/iscrizionidb
    username: admin
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# URL dei servizi chiamati via Feign
# In locale (IntelliJ) : localhost
# In Docker Compose    : nome del contenitore
servizi:
  studenti:
    url: http://localhost:8081
  corsi:
    url: http://localhost:8083

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
